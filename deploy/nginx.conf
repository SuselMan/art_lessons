# Production nginx site config (#111) — installed at
# /etc/nginx/sites-available/art-lessons on the VPS (see deploy/README.md).
# Serves apps/web's static build directly and reverse-proxies /api and
# /socket.io to the server container (published to 127.0.0.1:4000 only —
# see docker-compose.prod.yml) — the exact same same-origin shape
# apps/web/vite.config.ts's dev proxy already uses, so the built frontend
# needs no separate production config of its own (API_BASE = '' throughout,
# see lib/api.ts and Room/index.tsx's socket connection).
#
# The TLS block below (cert paths, http2, the :80 redirect server) was
# originally written in-place by certbot's nginx plugin (`certbot --nginx`)
# on first cert issuance, then captured back into this file so deploy.sh can
# sync it on every push instead of this file staying a TLS-less template
# forever. certbot's renewal timer only rewrites the cert files themselves
# at these same fixed paths — it doesn't touch nginx.conf again — so this
# stays accurate across renewals. A domain/cert change would need updating
# the paths below by hand.
server {
    server_name 5ryx.l.time4vps.cloud;

    root /var/www/art-lessons/dist;
    index index.html;

    # /etc/nginx/nginx.conf (Debian's default, not tracked in this repo) has
    # `gzip on` but leaves `gzip_proxied`/`gzip_types` at their defaults —
    # `gzip_proxied` defaults to `off` (never compress a proxied response at
    # all) and `gzip_types` defaults to just `text/html`. Net effect: every
    # proxied /socket.io/ response (room_state, operation relay — see
    # socketHandlers.ts) was going out completely uncompressed. Overriding
    # both here, in the tracked site config, rather than editing the
    # untracked global one. A single ~1MB stroke operation's JSON (a long
    # fill, thousands of dabs) gzips to ~225KB (~4.4x, measured against a
    # real one) — this is what actually fixed a room with 25MB of history
    # taking minutes to join, not (just) the buffer-size increases below.
    gzip on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 512;
    gzip_types application/json text/plain application/octet-stream;

    # Socket.io needs the Upgrade/Connection headers for the WebSocket
    # transport, plus a long read timeout so an idle-but-open connection
    # (a participant just watching, not actively drawing) isn't killed by
    # nginx's default proxy timeout. client_max_body_size defaults to 1m —
    # a long stroke's operation packet (thousands of dabs, see engine/
    # index.ts's STROKE_DAB_CHUNK_LIMIT) could exceed that before the chunk
    # cap existed, and nginx would reject it with a 413 before it ever
    # reached the Node process — the operation just silently never arrived
    # (found via a live "long strokes vanish after reload" report). The
    # chunk cap now keeps any single operation well under even the old 1m
    # default, but this stays as a generous margin against anything else
    # (a big snapshot upload, a future larger chunk size) hitting the same
    # wall the same silent way.
    location /socket.io/ {
        client_max_body_size 20m;
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # Fastify's own bodyLimit for the snapshot-upload route is already 20MB
    # (see snapshotRoutes.ts's SNAPSHOT_UPLOAD_BODY_LIMIT_BYTES) — pointless
    # without matching headroom here, since nginx's 1m default would 413 the
    # request before it ever reached Fastify.
    location /api/ {
        client_max_body_size 20m;
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vite's own bundle output — every filename is content-hashed
    # (index-<hash>.js etc), so a byte-identical URL can never change
    # meaning: safe to cache forever, no revalidation round-trip needed.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Offline-baked paper-grain textures (apps/web/scripts/bakePaperTextures.ts)
    # — filenames are NOT content-hashed yet (rough.paper/smooth.paper/
    # bristol.paper are fixed names), so a long immutable cache here would
    # keep serving a stale bake forever after a re-bake. A modest max-age
    # still cuts the near-every-load revalidation round-trip these were
    # getting (ETag/Last-Modified alone gave almost no heuristic freshness
    # right after a fresh deploy) without that risk. Raise this once the
    # filenames are content-hashed.
    location /paper/ {
        add_header Cache-Control "public, max-age=86400" always;
    }

    # react-router (client-side routing) — any path that isn't a real static
    # file falls back to index.html so a deep link (e.g. /room/abc123)
    # doesn't 404 on a hard refresh.
    location / {
        try_files $uri /index.html;
    }

    listen [::]:443 ssl http2 ipv6only=on; # managed by Certbot
    listen 443 ssl http2; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/5ryx.l.time4vps.cloud/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/5ryx.l.time4vps.cloud/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = 5ryx.l.time4vps.cloud) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name 5ryx.l.time4vps.cloud;
    return 404; # managed by Certbot
}
